<!DOCTYPE html>
<html>

<head>
<title>Harvard Shuttle Finder</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:80px;
background:#f5f5f5;
}

h1{
font-size:40px;
margin-bottom:30px;
}

button{
font-size:20px;
padding:12px 25px;
border:none;
background:#a41034;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#7a0c28;
}

#result{
margin-top:40px;
font-size:22px;
}

.card{
background:white;
width:420px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="card">

<h1>Harvard Shuttle Finder</h1>

<button onclick="findShuttle()">Find Shuttle</button>

<div id="result"></div>

</div>

<script>

async function findShuttle(){

const lat = 42.3733
const lon = -71.1189

const res = await fetch("https://harvard-shuttle.onrender.com/nearest?lat="+lat+"&lon="+lon)

const data = await res.json()

let arrivalsText = "No upcoming shuttle data"

if(data.next_arrivals && data.next_arrivals.length > 0){

arrivalsText = data.next_arrivals
.map(a => a.arrival_minutes + " min")
.join(", ")

}

document.getElementById("result").innerHTML =

"<p><b>Nearest Stop:</b> "+data.stop+"</p>" +
"<p><b>Walk Time:</b> "+data.walk_minutes+" minutes</p>" +
"<p><b>Next Shuttles:</b> "+arrivalsText+"</p>"

}

</script>

</body>

</html>
