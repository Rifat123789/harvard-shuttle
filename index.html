<!DOCTYPE html>
<html>
<head>
<title>Harvard Shuttle</title>
<style>
body{font-family:Arial;text-align:center;margin-top:60px}
button{padding:12px 20px;font-size:18px}
</style>
</head>

<body>

<h1>Harvard Shuttle Finder</h1>

<button onclick="findShuttle()">Find Nearest Shuttle</button>

<h3 id="stop"></h3>
<h3 id="walk"></h3>
<h3 id="arrivals"></h3>

<script>

async function findShuttle(){

navigator.geolocation.getCurrentPosition(async (pos)=>{

const lat=pos.coords.latitude
const lon=pos.coords.longitude

const res=await fetch(`/nearest?lat=${lat}&lon=${lon}`)
const data=await res.json()

document.getElementById("stop").innerText="Stop: "+data.stop
document.getElementById("walk").innerText="Walk: "+data.walk_minutes+" minutes"

let arr=data.next_arrivals.map(a=>a.arrival_minutes+" min").join(", ")

document.getElementById("arrivals").innerText="Next shuttles: "+arr

})

}

</script>

</body>
</html>
